name: Sync Slack requests

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit data/requests.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install slack-sdk

      - name: Run sync script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/sync_slack.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/requests.json
          git diff --cached --quiet || git commit -m "chore: sync Slack requests [$(date -u +%Y-%m-%d)]"
          git push
